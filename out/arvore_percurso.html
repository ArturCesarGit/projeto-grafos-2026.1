        <center>

        <style type="text/css">

             #mynetwork {
                 width: 100%;
                 height: 750px;
                 background-color: #222222;
                 border: 1px solid lightgray;
                 position: relative;
                 float: left;
             }

             

             

             
        </style>

    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  nodes = new vis.DataSet([{"color": "#1f874c", "font": {"color": "white"}, "id": "REC", "label": "REC", "shape": "dot", "size": 25}, {"color": "#1f874c", "font": {"color": "white"}, "id": "GRU", "label": "GRU", "shape": "dot", "size": 25}, {"color": "#1f874c", "font": {"color": "white"}, "id": "POA", "label": "POA", "shape": "dot", "size": 25}, {"color": "#2980b9", "font": {"color": "white"}, "id": "MAO", "label": "MAO", "shape": "dot", "size": 25}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "#27ae60", "from": "REC", "to": "GRU", "width": 4}, {"arrows": "to", "color": "#27ae60", "from": "GRU", "to": "POA", "width": 4}, {"arrows": "to", "color": "#3498db", "from": "MAO", "to": "GRU", "width": 4}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });

                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": false,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
    </body>
